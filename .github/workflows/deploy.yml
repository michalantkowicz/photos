# Deploys the site to the FTP server.
#
# Uses lftp — the same tool and the same `mirror -R` command that already
# works from your machine — so it behaves identically to a manual deploy.
# All server details (host, login, target folder) live in repo Secrets, so
# nothing private is written in this file.

name: Deploy to FTP

# Runs ONLY when you click "Run workflow" in the Actions tab.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Copy the repository onto the temporary build machine.
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install lftp (not preinstalled on the runner).
      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp

      # 3. Upload the files. `mirror -R` sends only new/changed files and never
      #    deletes anything; the excluded paths (config.local.php, data/, and
      #    dev-only folders) are never uploaded or touched.
      #
      #    The `set` lines make the connection robust on a CI runner:
      #      - ssl-protect-data    : encrypt the data channel (many FTPS
      #                              servers stall the transfer without this)
      #      - dns:order inet      : use IPv4 (avoids IPv6 hangs on runners)
      #      - net:timeout/retries : fail fast instead of hanging for minutes
      #    `debug 3` prints the FTP dialogue so a failure shows WHERE it broke.
      - name: Upload via lftp
        timeout-minutes: 8
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          lftp <<SCRIPT
          set ssl:verify-certificate false
          set ftp:ssl-protect-data true
          set dns:order "inet"
          set net:timeout 20
          set net:max-retries 2
          set net:reconnect-interval-base 5
          set cmd:fail-exit yes
          debug 3
          open -u '$FTP_USER','$FTP_PASSWORD' '$FTP_HOST'
          cd '$FTP_SERVER_DIR'
          mirror -R --verbose --exclude-glob .git* --exclude-glob docker/ --exclude-glob tests/ --exclude-glob test-results/ --exclude-glob db/ --exclude-glob logs/ --exclude-glob data/ --exclude AGENT.md --exclude README.md --exclude docker-compose.yml --exclude config.local.php --exclude config.local.php.example --exclude .dockerignore ./ .
          bye
          SCRIPT
