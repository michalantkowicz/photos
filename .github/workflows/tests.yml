# Runs the Playwright E2E suite on every push.
#
# It does the same thing you do locally — `docker compose up` to start the
# PHP app + MySQL, then `cd tests && npm test` — just on a GitHub machine.
# No secrets needed; everything runs self-contained on the runner.

name: E2E tests

on:
  push:
  workflow_dispatch:   # also runnable by hand from the Actions tab

# If you push again while a run is still going, cancel the older one.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tests/package-lock.json

      - name: Start the Docker stack (PHP app + MySQL)
        run: docker compose up -d --build --wait

      - name: Wait for the app to respond
        run: |
          for i in $(seq 1 30); do
            if curl -fsS -o /dev/null http://localhost:8080/admin; then
              echo "App is up."; exit 0
            fi
            echo "waiting for app... ($i)"; sleep 2
          done
          echo "App did not become ready in time."; exit 1

      - name: Install test dependencies
        working-directory: tests
        run: npm ci

      - name: Install Playwright browser
        working-directory: tests
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: tests
        run: npm test

      # On failure only: save traces/screenshots so you can download them
      # from the run page and inspect what broke.
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: tests/test-results/
          retention-days: 7
          if-no-files-found: ignore

      # On failure only: dump container logs to help debug.
      - name: Show container logs
        if: failure()
        run: docker compose logs --no-color
